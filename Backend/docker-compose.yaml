services:

  backend:

    build: .

    ports:
      - "5000:5000"

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}

  postgres:

    image: postgres:16

    restart: always

    env_file:
      - .env.docker

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    restart: always

volumes:
  postgres_data: